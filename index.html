<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Automatically redirect to demo.html when hosted on GitHub Pages or custom domain
      // (ignores localhost so local Vite development still works)
      if (!window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
        if (!window.location.pathname.endsWith('demo.html')) {
          var base = window.location.pathname;
          if (!base.endsWith('/')) {
            base += '/';
          }
          window.location.replace(base + 'demo.html');
        }
      }
    </script>
    <title>Liquid Glass UI — Premium Glassmorphic Component Showcase</title>
